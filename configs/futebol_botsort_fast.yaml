# BoT-SORT FAST configuration for ball tracking
# Same as default tracker but with GMC disabled to avoid duplicated camera-motion cost.

tracker_type: botsort

# Track Management
track_high_thresh: 0.6
track_low_thresh: 0.1
new_track_thresh: 0.7
track_buffer: 30
match_thresh: 0.8
fuse_score: true

# Global Motion Compensation
gmc_method: none

# ReID
with_reid: false
proximity_thresh: 0.5
appearance_thresh: 0.25
model: auto
